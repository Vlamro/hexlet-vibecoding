<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор калорий и ИМТ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="page__header">
      <h1>Калькулятор калорий</h1>
      <p class="page__subtitle">ИМТ, дневная норма калорий и воды</p>
    </header>

    <section class="card yandex-form">
      <script src="https://forms.yandex.ru/_static/embed.js"></script><iframe src="https://forms.yandex.ru/u/6a4bb367eb61460951d8e509?iframe=1" frameborder="0" name="ya-form-6a4bb367eb61460951d8e509" width="650" height="900" class="yandex-form__iframe"></iframe>
    </section>

    <form class="card" id="calc-form">
      <div class="field">
        <label for="height">Рост, см</label>
        <input type="number" id="height" name="height" min="100" max="250" step="1" placeholder="175" required />
      </div>

      <div class="field">
        <label for="weight">Вес, кг</label>
        <input type="number" id="weight" name="weight" min="30" max="300" step="0.1" placeholder="72" required />
      </div>

      <div class="field">
        <label for="age">Возраст, лет</label>
        <input type="number" id="age" name="age" min="10" max="120" step="1" placeholder="30" required />
      </div>

      <div class="field">
        <label for="sex">Пол</label>
        <select id="sex" name="sex">
          <option value="male">Мужской</option>
          <option value="female">Женский</option>
        </select>
      </div>

      <div class="field">
        <label for="activity">Уровень активности</label>
        <select id="activity" name="activity">
          <option value="1.2">Минимальный (сидячий образ жизни)</option>
          <option value="1.375">Лёгкая активность (1-3 тренировки в неделю)</option>
          <option value="1.55" selected>Средняя активность (3-5 тренировок в неделю)</option>
          <option value="1.725">Высокая активность (6-7 тренировок в неделю)</option>
          <option value="1.9">Очень высокая (физическая работа + тренировки)</option>
        </select>
      </div>

      <button type="submit" class="button">Рассчитать</button>
    </form>

    <section class="card results" id="results" hidden>
      <div class="result">
        <span class="result__label">Индекс массы тела</span>
        <div class="result__value-row">
          <span class="result__value" id="bmi-value">—</span>
          <span class="result__badge" id="bmi-category">—</span>
        </div>
        <p class="result__hint" id="bmi-hint"></p>
      </div>

      <div class="result">
        <span class="result__label">Дневная норма калорий</span>
        <div class="result__value-row">
          <span class="result__value" id="calories-value">—</span>
          <span class="result__unit">ккал</span>
        </div>
      </div>

      <div class="result">
        <span class="result__label">Дневная норма воды</span>
        <div class="result__value-row">
          <span class="result__value" id="water-value">—</span>
          <span class="result__unit">л</span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
